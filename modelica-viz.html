<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
    <title>JSON Schema Viewer</title>

    <!-- Bootstrap -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans|PT+Sans" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <link rel="stylesheet" href="css/jsv.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>

  </head>
  <body>

    <!-- Nav/Toolbar -->
    <div class="btn-group" id="app-toolbar">
        <button id="visualizeButton" type="button" class="btn btn-default"><span class="glyphicon glyphicon-eye-open"> </span> Visualize</button>
        <button id="sourceButton" type="button" class="btn btn-default"><span class="glyphicon glyphicon-align-left"> </span> Source</button>
    </div>

    <!-- JSV -->
    <div id="main-body"></div>

    <!-- Editor -->
    <div id="editor">
      <pre id="json"></pre>
    </div>

    <div id="legend-container">
        <div id="legend">
            <h3 class="ui-mini">Legend</h3>
            <hr />
            <div id="legend-items">
            </div>
        </div>
    </div>



    <script>
      NProgress.start();
    </script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.2.5/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.2.5/mode-json.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.2.5/theme-chrome.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.15.0/lodash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tv4/1.2.7/tv4.min.js"></script>
    <script src="js/jsv.js"></script>
    <script src="js/ref-parser.min.js"></script>
    <script src="js/app.js"></script>
    <script type="text/javascript">
    if (window.location.protocol === 'file:') {
      NProgress.done();
      document.getElementById('main-body').innerHTML =
        '<div style="padding:2em;font-family:sans-serif;">' +
        '<h3>&#9888; Cannot load schema over <code>file://</code></h3>' +
        '<p>Browsers block local file requests (CORS) when a page is opened directly ' +
        'from the filesystem. Please serve the files via a local HTTP server instead:</p>' +
        '<pre style="background:#f4f4f4;padding:1em;border-radius:4px;">' +
        'cd ' + window.location.pathname.replace(/\/[^/]*$/, '') + '\n' +
        'python3 -m http.server 8000\n' +
        '# then open: http://localhost:8000/modelica-viz.html' +
        '</pre></div>';
    } else {
      fetch('./schema-modelica.json')
        .then(function(response) {
          if (!response.ok) {
            throw new Error('HTTP ' + response.status + ' – ' + response.statusText);
          }
          return response.json();
        })
        .then(function(data) {
          appInitWithSchema(JSON.stringify(data, null, 4));
          NProgress.done();
        })
        .catch(function(err) {
          NProgress.done();
          document.getElementById('main-body').innerHTML =
            '<div style="padding:2em;font-family:sans-serif;\">' +
            '<h3>&#9888; Failed to load schema-modelica.json</h3>' +
            '<p>' + err + '</p></div>';
        });
    }
    </script>
  </body>
</html>
